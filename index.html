    <style>
        .features {
            list-style-type: disc;  /* solid round bullets */
            margin-left: 1.5em;     /* indent to taste */
        }

        .lead-video-player-wrapper {
            border-radius: 15px;
            overflow: hidden;
            background-color: #363636;
            position: relative;
            margin: 0 auto 1rem;
            display: block;
            width: 80%;
            aspect-ratio: 16 / 9;
        }
      
        .lead-video-player-wrapper video {
            display: block;
            width: 100%;  
            height: auto; 
        }
      
        .video-thumbnail-strip {
            display: flex;            
            flex-direction: column; 
            flex-wrap: nowrap;        
            gap: 10px;               
            justify-content: flex-start; 
            align-items: center;
        }
      
        .video-thumbnail-strip .thumbnail-video-wrapper {
            position: relative;
            width: 12vw;
            aspect-ratio: 16 / 9;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 3px solid transparent;
            transition: border-color 0.2s ease-in-out,
                        transform    0.2s ease-in-out;
            background-color: #2b2b2b;
        }
      
        .video-thumbnail-strip .thumbnail-video-wrapper video.thumbnail-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
            display: block;
        }
      
        .video-thumbnail-strip .thumbnail-video-wrapper:hover {
            border-color: #EDF7F1;
            transform: scale(1.05);
        }
      
        .video-thumbnail-strip .thumbnail-video-wrapper.active {
            border-color: #297270;
            transform: scale(1.05);
        }
    </style>
